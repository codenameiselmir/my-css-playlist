<!--
======================================
What is CSS? and CSS Syntax
======================================

CSS stands for Cascading Style Sheets. CSS is 
used to change the appearance of HTML elements.

HTML creates the structure of a web page. CSS 
controls how the HTML elements look. 

Example, HTML creates the heading. CSS changes 
the heading color.

Example HTML:

<h1>Hello World</h1>

Example CSS:

h1 {
    color: blue;
}

In this example:

- h1 -> Selector.
- color -> Property
- blue -> Value

So, our CSS Syntax is:

Selector {
    Property: Value;
}
======================================
-->

<!--
======================================
Three ways to add CSS
======================================

CSS can be added to HTML in three ways:

1. Inline CSS, is written directly inside 
an HTML element using the style attribute.

Example:

<p style="color: red;">This text is red.</p>

2. Internal CSS, is written inside a <style> element.
The <style> element is normally placed inside the <head>.

Example:

<head>
    <style>
        p {
            color: blue;
        }
    </style>
</head>

3. External CSS, is written inside a separate CSS file.

Example CSS filename:

style.css

The CSS file is connected to the HTML file using
the <link> element.

Example:

<link rel="stylesheet" href="style.css">

The <link> element is placed inside the <head>.

External CSS is usually the recommended method because
it keeps HTML and CSS in separate files.
======================================
-->

<!--
======================================
What is a CSS selector?
======================================

A CSS selector chooses the HTML element that we want
to style. Basic CSS selectors include:

- Element selector, An element selector selects HTML 
elements using their tag name.

HTML:

<p>This is a paragraph.</p>

CSS:

p {
    color: green;
}

This selector changes all <p> elements. 

- Class selector, selects elements using their
class attribute. A class selector starts with a dot.

HTML:

<p class="red-text">This text is red.</p>

CSS:

.red-text {
    color: red;
}

The same class can be used on multiple elements.

- ID selector, selects an element using its
id attribute. An ID selector starts with a hash symbol.

HTML:

<h1 id="main-title">Introduction to CSS</h1>

CSS:

#main-title {
    color: purple;
}

An ID should normally be unique on the page.
======================================
-->

<!--
======================================
Class and ID difference
======================================

A class can be used on multiple elements.

Example:

<p class="blue-text">First blue text</p>
<p class="blue-text">Second blue text</p>

An ID should normally be used for one unique element.

Example:

<h1 id="main-title">Introduction to CSS</h1>
======================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to CSS</title>

    <!-- Connects style.css to this HTML file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="main-title">Introduction to CSS</h1>
        <p class="blue-text">Cascading Style Sheets.</p>
    </header>

    <main>
        <h2>Colorful Text Examples</h2>

        <p class="red-text">
            This paragraph is red.
        </p>

        <p class="blue-text">
            This paragraph is blue.
        </p>

        <p class="green-text">
            This paragraph is green.
        </p>
    </main>

    <footer>
        <p class="gray-text">
            Lesson 1 - Introduction to CSS
        </p>
    </footer>
</body>
</html>
